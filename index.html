<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobient</title>
  <meta name="description" content="The operational standard for intravehicular logistics efficiency.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #06080d;
      --bg-mid: #0c1018;
      --surface: #111620;
      --surface-hover: #171d2a;
      --border: #1e2636;
      --border-focus: #3b82f6;
      --text-primary: #e8ecf4;
      --text-secondary: #7a8599;
      --text-muted: #4a5568;
      --accent: #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.12);
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(59,130,246,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 80% 20%, rgba(59,130,246,0.03) 0%, transparent 60%),
        var(--bg-deep);
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.06) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.09) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,0.07) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.11) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.05) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5% 55%, rgba(255,255,255,0.18) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 95% 65%, rgba(255,255,255,0.14) 0%, transparent 100%);
    }

    /* subtle grid lines */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 0%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 0%, transparent 80%);
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      text-align: center;
    }

    /* ── Wordmark ── */
    .wordmark {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 0.3em;
      opacity: 0;
      animation: fadeUp 1s ease-out 0.2s forwards;
    }

    .wordmark span {
      color: var(--accent);
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(0.75rem, 1.6vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease-out 0.5s forwards;
    }

    /* ── CTA ── */
    .cta-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.9em 2.4em;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeUp 1s ease-out 0.8s forwards;
      position: relative;
      overflow: hidden;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta-btn:hover {
      border-color: var(--accent);
      color: var(--white);
    }

    .cta-btn:hover::before {
      opacity: 1;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 1s ease-out 1.1s forwards;
    }

    /* ── Modal Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(6, 8, 13, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 440px;
      padding: 2.4rem 2rem 2rem;
      position: relative;
      transform: translateY(12px);
      transition: transform 0.3s ease;
    }

    .overlay.active .modal {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal h2 {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1.6rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.45rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-primary);
      background: var(--bg-mid);
      border: 1px solid var(--border);
      padding: 0.7em 0.9em;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--text-muted);
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--border-focus);
    }

    .field textarea {
      height: 5.5rem;
    }

    .send-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 100%;
      padding: 0.85em;
      color: var(--white);
      background: var(--accent);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.4rem;
    }

    .send-btn:hover {
      opacity: 0.88;
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .form-status {
      font-size: 0.78rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2em;
      color: var(--text-secondary);
    }

    .form-status.error {
      color: #f87171;
    }

    .form-status.success {
      color: #4ade80;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .modal { padding: 2rem 1.4rem 1.6rem; }
    }
  </style>
<!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-9VWaE5Al7UDYZ34N65Wm6.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
</head>
<body>
  <div class="bg"></div>

  <main class="page">
    <h1 class="wordmark">Mo<span>b</span>ient</h1>
    <p class="tagline">Coming soon</p>
    <button class="cta-btn" id="openModal">Learn about Mobient</button>
  </main>

  <footer class="footer">&copy; 2026 Mobient</footer>

  <!-- ── Modal ── -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <button class="modal-close" id="closeModal" aria-label="Close">&times;</button>
      <h2>Get in touch</h2>

      <!--
        ╔══════════════════════════════════════════════════════════════╗
        ║  PASTE YOUR FORMSPREE ENDPOINT BELOW                       ║
        ║  Replace YOUR_FORM_ID with the ID from formspree.io        ║
        ╚══════════════════════════════════════════════════════════════╝
      -->
      <form id="inquiryForm" action="https://formspree.io/f/mbdpgapo" method="POST">
        <div class="field">
          <label for="email">Email <span style="color:var(--accent)">*</span></label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="message">Message <span style="color:var(--text-muted)">(optional)</span></label>
          <textarea id="message" name="message" placeholder="What brings you to Mobient?"></textarea>
        </div>
        <button type="submit" class="send-btn" id="sendBtn">Send</button>
      </form>
      <p class="form-status" id="formStatus"></p>
    </div>
  </div>

  <script>
    const overlay  = document.getElementById('overlay');
    const openBtn  = document.getElementById('openModal');
    const closeBtn = document.getElementById('closeModal');
    const form     = document.getElementById('inquiryForm');
    const sendBtn  = document.getElementById('sendBtn');
    const status   = document.getElementById('formStatus');

    function openModal()  { overlay.classList.add('active'); }
    function closeModal() {
      overlay.classList.remove('active');
      status.textContent = '';
      status.className = 'form-status';
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          status.textContent = 'Received — we\'ll be in touch.';
          status.className = 'form-status success';
          form.reset();
        } else {
          throw new Error();
        }
      } catch {
        status.textContent = 'Something went wrong. Try again.';
        status.className = 'form-status error';
      }

      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    });
  </script>
</body>
</html>
